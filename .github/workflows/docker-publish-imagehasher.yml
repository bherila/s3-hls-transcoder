name: publish-imagehasher

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/bherila/s3-hls-imagehasher
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # amd64-only: the deploy host is amd64, and the image compiles the C++
      # pdq-photo-hasher from source — cross-building it under QEMU is slow and
      # buys nothing here. Add linux/arm64 if an arm deploy target appears.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.imagehasher
          platforms: linux/amd64
          push: true
          build-args: |
            THREATEXCHANGE_REF=07b82cb6e87b7e0ac7fc2a01d865df5db10ee1f2
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
